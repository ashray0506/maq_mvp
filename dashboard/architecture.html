<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Strategic Data Architecture</title>

<style>
  body{
    margin:0;
    padding:20px;
    font-family:system-ui,-apple-system,sans-serif;
    background:#f8f9fa;
  }

  h2{
    font-size:15px;
    font-weight:500;
    color:#1a1a2e;
    margin:0 0 4px 0;
  }

  p{
    font-size:12px;
    color:#5f6368;
    margin:0 0 16px 0;
  }

  svg{
    max-width:100%;
    height:auto;
  }

  svg text{
    font-family:system-ui,-apple-system,sans-serif;
  }

  .node{
    cursor:pointer;
  }

  .node:hover rect,
  .node:hover circle{
    opacity:0.85;
  }

  .panel{
    border:1px solid #e8eaed;
    border-radius:8px;
    padding:12px 16px;
    background:#fff;
    margin-top:12px;
    font-size:12px;
    color:#5f6368;
    display:none;
    line-height:1.7;
  }

  .panel strong{
    color:#1a1a2e;
    font-weight:600;
  }

  .tag{
    display:inline-block;
    font-size:10px;
    padding:2px 7px;
    border-radius:10px;
    font-weight:600;
    margin-right:4px;
  }

  .mvp{
    background:#EAF3DE;
    color:#27500A;
  }

  .prod{
    background:#E6F1FB;
    color:#0C447C;
  }

  .tags{
    margin:6px 0 8px;
  }

  .row{
    margin-top:4px;
  }

  .lbl{
    font-weight:600;
    font-size:11px;
  }

  .lbl.g{
    color:#27500A;
  }

  .lbl.b{
    color:#0C447C;
  }
</style>
</head>

<line x1="88" y1="20" x2="88" y2="270" stroke="#e8eaed" stroke-width="0.5"/>

<line x1="462" y1="20" x2="462" y2="270" stroke="#e8eaed" stroke-width="0.5"/>
<line x1="598" y1="20" x2="598" y2="270" stroke="#e8eaed" stroke-width="0.5"/>

<text x="104" y="102" font-size="9" fill="#27500A" font-weight="700">

<line x1="302" y1="77" x2="310" y2="77"

      marker-end="url(#arr)"/>

<line x1="386" y1="77" x2="394" y2="77"
      stroke="#378ADD" stroke-width="1.5"
      marker-end="url(#arr)"/>

<line x1="452" y1="77" x2="470" y2="77"
      stroke="#378ADD" stroke-width="1.5"
      marker-end="url(#arr)"/>

<line x1="588" y1="77" x2="604" y2="77"
      stroke="#378ADD" stroke-width="1.5"
      marker-end="url(#arr)"/>

</svg>

<div id="panel" class="panel"></div>

<script>
const D = {

  src:{
    t:'Alpha Vantage',
    tags:['MVP ✓'],
    mvp:'TIME_SERIES_DAILY for SPY.',
    prod:'Premium or Bloomberg.'
  },

  src2:{
    t:'FRED API',
    tags:['MVP ✓'],
    mvp:'FEDFUNDS and GS10.',
    prod:'Add SOFR and CPI.'
  },

  ing:{
    t:'Ingestion layer',
    tags:['MVP ✓'],
    mvp:'Python ingest pipeline.',
    prod:'Airflow + Fivetran.'
  },

  bronze:{
    t:'Bronze layer',
    tags:['MVP ✓'],
    mvp:'Immutable parquet.',
    prod:'S3 versioned lake.'
  },

  silver:{
    t:'Silver layer',
    tags:['MVP ✓'],
    mvp:'DuckDB cleaned views.',
    prod:'Iceberg + dbt.'
  },

  gold:{
    t:'Gold layer',
    tags:['MVP ✓'],
    mvp:'KPI metrics layer.',
    prod:'Snowflake marts.'
  },

  gov:{
    t:'Governance',
    tags:['MVP ✓'],
    mvp:'DQ and lineage tables.',
    prod:'Alation + OpenLineage.'
  },

  con:{
    t:'Dashboard',
    tags:['MVP ✓'],
    mvp:'Streamlit dashboard.',
    prod:'Looker or Tableau.'
  }
};

function resetNodes(){
  document
    .querySelectorAll('.node rect')
    .forEach(r => r.style.opacity = '1');
}

function show(id){

  const d = D[id];

  if(!d) return;

  resetNodes();

  const tags = (d.tags || [])
    .map(t => `<span class="tag mvp">${t}</span>`)
    .join('');

  document.getElementById('panel').style.display = 'block';

  document.getElementById('panel').innerHTML =
    `<strong>${d.t}</strong>
     <div class="tags">${tags}</div>
     <div class="row">
       <span class="lbl g">MVP:</span> ${d.mvp}
     </div>
     <div class="row">
       <span class="lbl b">Production:</span> ${d.prod}
     </div>`;

  document
    .querySelectorAll('.node rect')
    .forEach(r => r.style.opacity = '0.35');

  const el = document.getElementById(id);

  if(el){
    el.querySelectorAll('rect')
      .forEach(r => r.style.opacity = '1');
  }
}

document.querySelector('svg')
  .addEventListener('click', function(e){

    const tag = e.target.tagName.toLowerCase();

    if(tag === 'svg' || tag === 'line'){

      resetNodes();

      document.getElementById('panel').style.display = 'none';
    }
});

document.querySelectorAll('.node')
  .forEach(node => {

    node.addEventListener('keypress', function(e){

      if(e.key === 'Enter' || e.key === ' '){

        e.preventDefault();

        show(this.id);
      }
    });
});
</script>

</body>
</html>
