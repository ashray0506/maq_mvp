<div id="panel" class="panel"></div>

<script>
const D = {
  src:{t:'Alpha Vantage',tags:['MVP ✓'],mvp:'TIME_SERIES_DAILY for SPY. Free tier, 100 days. Retry 3x, rate limit detection via JSON Note key, schema validation. FEDFUNDS/252 used as daily risk-free rate for Sharpe.',prod:'Premium tier for full history. Switch symbol to AXJO for ASX 200. Or Refinitiv / Bloomberg.'},
  src2:{t:'FRED API',tags:['MVP ✓'],mvp:'FEDFUNDS (monthly rate) and GS10 (10Y Treasury). Free, unlimited. Monthly series forward-filled to daily for silver join.',prod:'Add SOFR for daily risk-free rate. Add CPI, VIX as additional macro series. Same ingest pattern.'},
  ing:{t:'Ingestion layer',tags:['MVP ✓'],mvp:'Python ingest.py with retry 3x / 5s backoff, rate limit detection, schema validation, DQ rules B1-B4. schedule library for daily 07:00 run.',prod:'Fivetran for SaaS / database connectors. Airflow DAG wrapping same Python functions — no refactoring needed.'},
  bronze:{t:'Bronze layer',tags:['MVP ✓'],mvp:'Local data/bronze/ parquet files. One per source per run, date-named. Immutable — never edited after write. DuckDB views registered over parquet.',prod:'AWS S3 with versioning. Same parquet format — DuckDB reads S3 natively. No format change needed.'},
  silver:{t:'Silver layer',tags:['MVP ✓'],mvp:'DuckDB views. Cleaned, joined on DATE_TRUNC(month), UTC-normalised. FRED forward-filled to daily. DQ rules S1-S5. Quarantine table for failed records.',prod:'S3 Iceberg tables. dbt models with tests. Same dimensional model — date, symbol, macro_value, loaded_at.'},
  gold:{t:'Gold layer',tags:['MVP ✓'],mvp:'DuckDB views. VWAP 20d, RSI-14 (Wilder EMA), EMA/SMA 3m, Sharpe, MDD, Volatility, VWAP Efficiency, Yield Spread. Only permitted dashboard source.',prod:'Snowflake materialised views. dbt models. Same SQL logic — portable.'},
  gov:{t:'Governance',tags:['MVP pattern ✓'],mvp:'governance_definitions + governance_lineage tables in DuckDB. 14 DQ rules across B/S/G layers. audit_pipeline_runs, audit_dq_results, quarantine_records.',prod:'Alation or Collibra for data catalogue. OpenLineage standard (auto-captured from dbt). Great Expectations for DQ rules.'},
  con:{t:'Dashboard — Market Analytics',tags:['MVP ✓'],mvp:'Streamlit app.py (port 8501) + observability.py (port 8502). See→Judge→Act. What-if simulator. Governance tab. Dark mode. Print. NBA engine.',prod:'Streamlit Cloud or Docker + nginx. Or Looker / Tableau connecting to Snowflake gold views for enterprise BI.'}
};

function show(id){
  const d=D[id];if(!d)return;
  const tags=(d.tags||[]).map(t=>`<span class="tag mvp">${t}</span>`).join('');
  document.getElementById('panel').style.display='block';
  document.getElementById('panel').innerHTML=
    `<strong>${d.t}</strong><div class="tags">${tags}</div>`+
    `<div class="row"><span class="lbl g">MVP: </span>${d.mvp}</div>`+
    `<div class="row" style="margin-top:4px"><span class="lbl b">Production: </span>${d.prod}</div>`;
  document.querySelectorAll('rect[rx]').forEach(r=>r.style.opacity='0.5');
  const el=document.getElementById(id);
  if(el)el.querySelectorAll('rect').forEach(r=>r.style.opacity='1');
}
document.querySelector('svg').addEventListener('click',function(e){
  if(e.target.tagName==='svg'||e.target.tagName==='line'||e.target.tagName==='text'){
    document.querySelectorAll('rect[rx]').forEach(r=>r.style.opacity='1');
    document.getElementById('panel').style.display='none';
  }
});
</script>
